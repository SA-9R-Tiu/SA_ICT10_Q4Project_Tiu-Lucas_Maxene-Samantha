<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <!-- Custom Colors -->
     <!--Internal CSS-->
    <style>
     .navbar {
            background-color: #cfb7c3;
            padding: 10px 0;
        }
        .navbar-brand, .nav-link {
            color: rgb(122, 108, 108);
            font-weight: bold;
        }
        .navbar-brand {
            font-size: 1.5rem;
        }
        .nav-link:hover {
            color: rgb(151, 99, 108);
        }

        body {
            background-color: #edd6e4; 
            font-family: 'Times New Roman', Times, serif;
        }
        .card-custom {
            background-color: #e3dfd3; 
            border-radius: 20px;
        }
        .btn-custom {
            background-color: #dfb5c7; 
            color: white;
        }
        .btn-custom:hover {
            background-color: #d3a0b9;
        }
        .title-text {
            color: #e3a3be;
            font-weight: bold;
        }
        #output {
            background-color: #886b6b; 
            color: white;
            border-radius: 10px;
        }
    </style>
</head>

 <body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">SY 25-26</a>

            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Classmates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="skillstest.html">Attendance Checker</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="highlight.html">Highlights</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Centered Card -->
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card card-custom shadow-lg p-4" style="width: 400px;">
            <h3 class="text-center title-text mb-4">
                Your Attendance Tracker
            </h3>

            <form>
                <div class="mb-3">
                    <label class="form-label fw-bold">Select Day</label>
                    <select id="dayOfTheWeek" class="form-select">
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Days of Absences</label>
                    <input type="number" id="absences"
                        class="form-control"
                        placeholder="Enter number of absences">
                </div>

                <div class="d-grid">
                    <input type="button"
                        py-click="displaying"
                        value="Submit"
                        class="btn btn-custom">
                </div>
            </form>

            <div id="output"
                class="mt-3 p-2 text-center fs-5"></div>
        </div>
    </div>
    <py-script src="st.py"></py-script>
</body>
</html>
