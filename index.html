<body>

<div class="container mt-5">
    
    <!-- Title -->
    <div class="text-center mb-4">
        <h1 class="fw-bold"> List of Grade 10 Classmates System</h1>
        <p class="text-muted">See and know your classmates more!</p>
    </div>

    <!-- Card Form -->
    <div class="card shadow p-4" style="background-color: rgb(225, 203, 222);">
        <div class="mb-3">
            <input type="text" id="classmate1" class="form-control" placeholder="Enter classmate name">
        </div>

        <div class="mb-3">
            <input type="text" id="section" class="form-control" placeholder="Enter section">
        </div>

        <div class="mb-3">
            <input type="text" id="subject" class="form-control" placeholder="Enter favorite subject">
        </div>

        <div class="d-flex gap-2">
            <input type="button" py-click="add_classmate" class="btn btn-danger w-20" value="Add Classmate">
            <input type="button" py-click="show_classmates" class="btn btn-danger w-30" value="Show List">
        </div>
    </div>

    <!--Output-->
    <div class="card shadow mt-4 p-3" style="background-color: rgb(224, 227, 231);">
        <h5 class="fw-bold">📋 Classmate List</h5>
        <div id="output" class="mt-2"></div>
    </div>

</div>
